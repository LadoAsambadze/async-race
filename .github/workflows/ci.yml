name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (ESLint, Airbnb)
        run: npm run lint
      - name: Format check (Prettier)
        run: npm run ci:format
      - name: Type-check & build
        run: npm run build
